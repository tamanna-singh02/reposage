function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clamp = useCallback(() => {
    const p = dragRef.current;
    if (!p) return;
    const w = p.offsetWidth, h = p.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    p.style.right = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    if (!open) return;
    clamp();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clamp) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clamp);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clamp); };
  }, [open, clamp]);

  useEffect(() => {
    const onMsg = e => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = e => {
    const p = dragRef.current;
    if (!p) return;
    const r = p.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const move = ev => {
      offsetRef.current = { x: sr - (ev.clientX - sx), y: sb - (ev.clientY - sy) };
      clamp();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = useRef(value);
  valueRef.current = value;

  const segAt = cx => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((cx - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = e => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = ev => { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </div>
  );
}

/* ─── Helpers ─────────────────────────────────────────────────────────────── */
function scoreColor(s) {
  if (s >= 0.93) return "#16a34a";
  if (s >= 0.85) return "#d97706";
  return "#9ca3af";
}

function timeAgo(iso) {
  if (!iso) return "";
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return `${Math.round(diff / 60)} min ago`;
  if (diff < 86400) return `${Math.round(diff / 3600)} hr ago`;
  return `${Math.round(diff / 86400)} day${Math.round(diff / 86400) > 1 ? "s" : ""} ago`;
}

function renderMarkdown(text, t) {
  const parts = text.split(/(```[\s\S]*?```)/g);
  return parts.map((p, i) => {
    if (p.startsWith("```")) {
      const code = p.replace(/^```\w*\n?/, "").replace(/\n?```$/, "");
      return (
        <pre key={i} style={{
          margin: "10px 0", padding: "12px 14px",
          background: t.codeBg, border: `1px solid ${t.codeBorder}`,
          borderRadius: t.radius, fontSize: 12.5, lineHeight: 1.6,
          fontFamily: "'JetBrains Mono','Fira Code','Courier New',monospace",
          color: t.codeText, overflowX: "auto",
        }}>{code}</pre>
      );
    }
    return (
      <span key={i} style={{ display: "inline" }}>
        {p.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).map((chunk, j) => {
          if (chunk.startsWith("**") && chunk.endsWith("**"))
            return <strong key={j}>{chunk.slice(2, -2)}</strong>;
          if (chunk.startsWith("`") && chunk.endsWith("`"))
            return (
              <code key={j} style={{
                background: t.codeBg, border: `1px solid ${t.codeBorder}`,
                padding: "1px 5px", borderRadius: Math.max(t.radius - 2, 2),
                fontSize: "0.87em", fontFamily: "'JetBrains Mono',monospace",
              }}>{chunk.slice(1, -1)}</code>
            );
          return chunk.split("\n").map((line, k, arr) => (
            <React.Fragment key={k}>{line}{k < arr.length - 1 && <br />}</React.Fragment>
          ));
        })}
      </span>
    );
  });
}

/* ─── App ─────────────────────────────────────────────────────────────────── */
function App({ token, user, onLogout }) {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = T[tweaks.theme] || T.notion;

  // Authenticated fetch — injects Bearer token on every request
  const api = (path, opts = {}) => {
    const { headers = {}, ...rest } = opts;
    return fetch(path, {
      ...rest,
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}`, ...headers },
    });
  };

  const [repos, setRepos] = useState([]);
  const [multiMode, setMultiMode] = useState(false);
  const [multiSelected, setMultiSelected] = useState([]);
  const [reposLoading, setReposLoading] = useState(true);
  const [view, setView] = useState("repos");
  const [activeRepo, setActiveRepo] = useState(null);

  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeRefs, setActiveRefs] = useState([]);

  const [historyOpen, setHistoryOpen] = useState(false);
  const [historySessions, setHistorySessions] = useState([]);
  const [historyLoading, setHistoryLoading] = useState(false);
  const [openSession, setOpenSession] = useState(null);
  const [saveToast, setSaveToast] = useState(false);

  const [fileTreeOpen, setFileTreeOpen] = useState(false);
  const [fileTreeFiles, setFileTreeFiles] = useState([]);
  const [fileTreeLoading, setFileTreeLoading] = useState(false);

  const [ingestUrl, setIngestUrl] = useState("");
  const [ingesting, setIngesting] = useState(false);
  const [ingestProgress, setIngestProgress] = useState(0);
  const [ingestMessage, setIngestMessage] = useState("");
  const [ingestDone, setIngestDone] = useState(false);
  const [ingestResult, setIngestResult] = useState(null);
  const [ingestError, setIngestError] = useState("");

  const chatEndRef = useRef(null);
  const textareaRef = useRef(null);

  // Load repos on mount
  useEffect(() => {
    fetchRepos();
  }, []);

  async function fetchRepos() {
    setReposLoading(true);
    try {
      const data = await api("/api/repos").then(r => r.json());
      setRepos(data);
      if (data.length > 0 && !activeRepo) {
        setActiveRepo(data[0]);
        setView("chat");
        setMessages(welcomeMessages(data[0]));
      } else if (data.length === 0) {
        setView("repos");
      }
    } catch (e) {
      console.error("Failed to load repos:", e);
    } finally {
      setReposLoading(false);
    }
  }

  function welcomeMessages(repo) {
    return [{
      role: "assistant",
      text: `Hi! I've indexed **${repo.owner}/${repo.name}** — ${repo.chunks?.toLocaleString()} chunks across ${repo.files} files. Ask me anything about the codebase.`,
      refs: [],
    }];
  }

  function selectRepo(repo) {
    setActiveRepo(repo);
    setMessages(welcomeMessages(repo));
    setActiveRefs([]);
    setView("chat");
  }

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ block: "end" });
  }, [messages, loading]);

  async function sendMessage() {
    if (!input.trim() || loading) return;
    if (multiMode && multiSelected.length === 0) return;
    if (!multiMode && !activeRepo) return;
    const text = input.trim();
    setMessages(m => [...m, { role: "user", text, refs: [] }]);
    setInput("");
    setLoading(true);
    setActiveRefs([]);

    // Multi-repo: non-streaming single call across collections
    if (multiMode) {
      setMessages(m => [...m, { role: "assistant", text: "", refs: [], streaming: true }]);
      try {
        const res = await api("/api/chat/multi", {
          method: "POST",
          body: JSON.stringify({ message: text, collections: multiSelected }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Request failed");
        setMessages(m => { const c = [...m]; c[c.length-1] = { role: "assistant", text: data.answer, refs: data.refs, streaming: false }; return c; });
        setActiveRefs(data.refs);
      } catch (e) {
        setMessages(m => { const c = [...m]; c[c.length-1] = { role: "assistant", text: `**Error:** ${e.message}`, refs: [], streaming: false }; return c; });
      } finally { setLoading(false); }
      return;
    }

    // Add an empty assistant bubble immediately so streaming text appears in place
    setMessages(m => [...m, { role: "assistant", text: "", refs: [], streaming: true }]);

    try {
      const res = await api(`/api/chat/${activeRepo.id}/stream`, {
        method: "POST",
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || "Request failed");
      }

      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            if (evt.type === "token") {
              setMessages(m => {
                const copy = [...m];
                copy[copy.length - 1] = { ...copy[copy.length - 1], text: copy[copy.length - 1].text + evt.text };
                return copy;
              });
            } else if (evt.type === "refs") {
              setMessages(m => {
                const copy = [...m];
                copy[copy.length - 1] = { ...copy[copy.length - 1], refs: evt.refs, streaming: false };
                return copy;
              });
              setActiveRefs(evt.refs);
            } else if (evt.type === "error") {
              throw new Error(evt.message);
            }
          } catch (_) {}
        }
      }
    } catch (e) {
      setMessages(m => {
        const copy = [...m];
        copy[copy.length - 1] = { role: "assistant", text: `**Error:** ${e.message}`, refs: [], streaming: false };
        return copy;
      });
    } finally {
      setMessages(m => {
        const copy = [...m];
        if (copy[copy.length - 1]?.streaming) copy[copy.length - 1] = { ...copy[copy.length - 1], streaming: false };
        return copy;
      });
      setLoading(false);
    }
  }

  async function clearHistory() {
    if (!activeRepo) return;
    await api(`/api/chat/${activeRepo.id}/history`, { method: "DELETE" });
    setMessages(welcomeMessages(activeRepo));
    setActiveRefs([]);
  }

  async function saveConversation() {
    if (!activeRepo) return;
    const toSave = messages.filter(m => m.role !== "assistant" || m.text !== welcomeMessages(activeRepo)[0]?.text);
    if (toSave.length === 0) return;
    const payload = toSave.map(m => ({ role: m.role, content: m.text, refs: m.refs || [] }));
    await api(`/api/chat/${activeRepo.id}/history`, {
      method: "POST",
      body: JSON.stringify({ messages: payload }),
    });
    setSaveToast(true);
    setTimeout(() => setSaveToast(false), 2500);
  }

  async function loadHistory() {
    if (!activeRepo) return;
    setHistoryLoading(true);
    try {
      const data = await api(`/api/chat/${activeRepo.id}/history`).then(r => r.json());
      setHistorySessions(data);
    } catch (e) { console.error(e); }
    finally { setHistoryLoading(false); }
  }

  async function openSessionModal(sessionId) {
    const data = await api(`/api/chat/${activeRepo.id}/history/${sessionId}`).then(r => r.json());
    setOpenSession(data);
  }

  function toggleHistory() {
    if (!historyOpen) { loadHistory(); setFileTreeOpen(false); }
    setHistoryOpen(h => !h);
  }

  async function toggleFileTree() {
    if (!fileTreeOpen) {
      setHistoryOpen(false);
      setFileTreeOpen(true);
      if (!activeRepo) return;
      setFileTreeLoading(true);
      try {
        const data = await api(`/api/repos/${activeRepo.id}/files`).then(r => r.json());
        setFileTreeFiles(data);
      } catch (e) { setFileTreeFiles([]); }
      finally { setFileTreeLoading(false); }
    } else {
      setFileTreeOpen(false);
    }
  }

  async function startIngest() {
    if (!ingestUrl.trim()) return;
    setIngesting(true);
    setIngestProgress(0);
    setIngestMessage("Starting…");
    setIngestDone(false);
    setIngestError("");
    setIngestResult(null);

    try {
      const res = await api("/api/repos/ingest", {
        method: "POST",
        body: JSON.stringify({ url: ingestUrl.trim() }),
      });

      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            setIngestProgress(evt.progress);
            setIngestMessage(evt.message);
            if (evt.stage === "done") {
              setIngestDone(true);
              setIngesting(false);
              setIngestResult(evt);
            } else if (evt.stage === "error") {
              setIngestError(evt.message);
              setIngesting(false);
            }
          } catch (_) {}
        }
      }
    } catch (e) {
      setIngestError(e.message);
      setIngesting(false);
    }
  }

  async function finishIngest() {
    const fresh = await api("/api/repos").then(r => r.json());
    setRepos(fresh);
    const repo = (ingestResult && fresh.find(r => r.id === ingestResult.collection)) || fresh[0];
    if (repo) {
      setActiveRepo(repo);
      setMessages(welcomeMessages(repo));
      setActiveRefs([]);
    }
    setIngestUrl("");
    setIngestProgress(0);
    setIngestDone(false);
    setIngestResult(null);
    setIngestMessage("");
    setView("chat");
  }

  useEffect(() => {
    document.body.style.background = t.bg;
  }, [t.bg]);

  const base = { height: "100%", display: "flex", flexDirection: "column", background: t.bg, color: t.text, fontSize: 14 };

  return (
    <div style={base}>
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <Sidebar t={t} view={view} setView={setView} activeRepo={activeRepo}
          repos={repos} reposLoading={reposLoading}
          onSelectRepo={selectRepo} user={user} onLogout={onLogout}
          multiMode={multiMode} multiSelected={multiSelected}
          onToggleMulti={() => { setMultiMode(m => !m); setMultiSelected([]); }}
          onToggleRepo={id => setMultiSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id])} />

        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {view === "repos" && (
            <ReposView t={t} repos={repos} loading={reposLoading}
              onSelect={selectRepo}
              onDelete={async (repo) => {
                if (!confirm(`Delete "${repo.name}"? This cannot be undone.`)) return;
                await api(`/api/repos/${repo.id}`, { method: "DELETE" });
                const fresh = await api("/api/repos").then(r => r.json());
                setRepos(fresh);
                if (activeRepo?.id === repo.id) { setActiveRepo(null); setView("repos"); }
              }}
              onReingest={async (repo) => {
                if (!confirm(`Re-index "${repo.name}"? This will pull the latest commits.`)) return;
                await api(`/api/repos/${repo.id}/reingest`, { method: "POST" });
                const fresh = await api("/api/repos").then(r => r.json());
                setRepos(fresh);
              }}
              onSaveNotes={async (repoId, notes) => {
                await api(`/api/repos/${repoId}/notes`, { method: "PATCH", body: JSON.stringify({ notes }) });
              }}
              onIngest={() => { setIngestUrl(""); setIngestDone(false); setIngestError(""); setIngesting(false); setView("ingest"); }} />
          )}
          {view === "ingest" && (
            <IngestView t={t}
              url={ingestUrl} setUrl={setIngestUrl}
              onStart={startIngest} ingesting={ingesting}
              progress={ingestProgress} message={ingestMessage}
              done={ingestDone} error={ingestError}
              onFinish={finishIngest}
              onRetry={() => { setIngestError(""); setIngestDone(false); }}
              onCancel={() => setView("repos")} />
          )}
          {view === "settings" && (
            <SettingsView t={t} user={user} api={api} onLogout={onLogout}
              onUserUpdate={u => { /* update would require re-fetching user; trigger logout/re-login on name change */ }} />
          )}
          {view === "chat" && (multiMode ? multiSelected.length > 0 : activeRepo) && (
            <>
              <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                {/* topbar */}
                <div style={{
                  padding: "0 20px", height: 52, display: "flex", alignItems: "center",
                  borderBottom: `1px solid ${t.border}`, background: t.bg, gap: 10, flexShrink: 0,
                }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={t.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                  </svg>
                  {multiMode
                    ? <><span style={{ fontWeight: 600, fontSize: 13.5 }}>Multi-repo</span>
                        <span style={{ fontSize: 12, color: t.accent, background: t.accentSubtle, border: `1px solid ${t.accent}`, padding: "2px 8px", borderRadius: 99 }}>{multiSelected.length} repos</span></>
                    : <><span style={{ fontWeight: 600, fontSize: 13.5 }}>{activeRepo?.owner}/{activeRepo?.name}</span>
                        <span style={{ fontSize: 12, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, padding: "2px 8px", borderRadius: 99 }}>{activeRepo?.chunks?.toLocaleString()} chunks</span></>
                  }
                  <div style={{ flex: 1 }} />
                  {saveToast && (
                    <span style={{ fontSize: 12, color: "#16a34a", padding: "4px 10px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: t.radius }}>
                      Saved ✓
                    </span>
                  )}
                  <button onClick={saveConversation}
                    style={{ fontSize: 12, color: t.accent, padding: "4px 10px", border: `1px solid ${t.accent}`, borderRadius: t.radius, background: "none", cursor: "pointer" }}>
                    Save conversation
                  </button>
                  {!multiMode && (
                    <button onClick={toggleFileTree}
                      style={{ fontSize: 12, color: fileTreeOpen ? t.accent : t.textMuted, padding: "4px 10px", border: `1px solid ${fileTreeOpen ? t.accent : t.border}`, borderRadius: t.radius, background: fileTreeOpen ? t.accentSubtle : "none", cursor: "pointer" }}>
                      Files
                    </button>
                  )}
                  <button onClick={toggleHistory}
                    style={{ fontSize: 12, color: historyOpen ? t.accent : t.textMuted, padding: "4px 10px", border: `1px solid ${historyOpen ? t.accent : t.border}`, borderRadius: t.radius, background: historyOpen ? t.accentSubtle : "none", cursor: "pointer" }}>
                    History
                  </button>
                  <button onClick={clearHistory}
                    style={{ fontSize: 12, color: t.textMuted, padding: "4px 10px", border: `1px solid ${t.border}`, borderRadius: t.radius, background: "none", cursor: "pointer" }}>
                    Clear
                  </button>
                </div>

                {/* messages */}
                <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
                  {messages.map((msg, i) => (
                    <MessageBubble key={i} msg={msg} t={t}
                      style={tweaks.bubbleStyle}
                      active={msg.refs === activeRefs}
                      onActivate={() => msg.refs?.length && setActiveRefs(msg.refs)} />
                  ))}
                  {loading && !messages.some(m => m.streaming) && <TypingIndicator t={t} />}
                  <div ref={chatEndRef} />
                </div>

                {/* input */}
                <div style={{ padding: "12px 24px 16px", borderTop: `1px solid ${t.border}`, background: t.bg, flexShrink: 0 }}>
                  <div style={{
                    display: "flex", alignItems: "flex-end", gap: 8,
                    border: `1.5px solid ${t.border}`, borderRadius: t.inputRadius + 2,
                    background: t.bg, padding: "8px 8px 8px 14px",
                    boxShadow: "0 1px 4px rgba(0,0,0,0.06)",
                  }}>
                    <textarea
                      ref={textareaRef}
                      value={input}
                      onChange={e => setInput(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                      placeholder="Ask a question about the codebase…"
                      rows={1}
                      style={{
                        flex: 1, border: "none", outline: "none", resize: "none",
                        fontSize: 14, lineHeight: 1.6, background: "transparent",
                        color: t.text, maxHeight: 120, overflowY: "auto",
                        fontFamily: "inherit",
                      }}
                    />
                    <button onClick={sendMessage} disabled={!input.trim() || loading}
                      style={{
                        width: 34, height: 34, borderRadius: t.radius, border: "none",
                        background: input.trim() && !loading ? t.accent : t.border,
                        color: "#fff", cursor: input.trim() && !loading ? "pointer" : "default",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "background 0.15s", flexShrink: 0,
                      }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                      </svg>
                    </button>
                  </div>
                  <div style={{ marginTop: 6, fontSize: 11, color: t.textMuted, textAlign: "center" }}>
                    Answers grounded in indexed source — always cite file + line
                  </div>
                </div>
              </div>

              {fileTreeOpen
                ? <FileTreePanel t={t} files={fileTreeFiles} loading={fileTreeLoading}
                    onClose={() => setFileTreeOpen(false)}
                    onFileClick={path => setInput(`Explain the file \`${path}\``)} />
                : historyOpen
                ? <HistoryPanel t={t} sessions={historySessions} loading={historyLoading}
                    onOpen={openSessionModal} onClose={() => setHistoryOpen(false)} />
                : <SourcesSidebar t={t} refs={activeRefs} repo={activeRepo} />
              }
              {openSession && (
                <SessionModal t={t} session={openSession} onClose={() => setOpenSession(null)} />
              )}
            </>
          )}
          {view === "chat" && !activeRepo && (
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: t.textMuted, fontSize: 14 }}>
              Select a repository to start chatting
            </div>
          )}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection title="Theme">
          <TweakRadio label="Style" value={tweaks.theme.replace("-dark","")} options={["github","linear","notion"]} onChange={v => setTweak("theme", tweaks.darkMode ? `${v}-dark` : v)} />
          <TweakRadio label="Mode" value={tweaks.darkMode ? "dark" : "light"} options={["light","dark"]} onChange={v => { const base = tweaks.theme.replace("-dark",""); setTweak({ darkMode: v==="dark", theme: v==="dark" ? `${base}-dark` : base }); }} />
        </TweakSection>
        <TweakSection title="Chat">
          <TweakRadio label="Bubble style" value={tweaks.bubbleStyle} options={["sided","minimal"]} onChange={v => setTweak("bubbleStyle", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

/* ─── Sidebar ─────────────────────────────────────────────────────────────── */
function Sidebar({ t, view, setView, activeRepo, repos, reposLoading, onSelectRepo, user, onLogout, multiMode, multiSelected, onToggleMulti, onToggleRepo }) {
  const navItems = [
    { id: "repos", label: "Repositories", icon: <path d="M3 3h18v18H3zM3 9h18M9 21V9"/> },
    { id: "chat", label: "Chat", icon: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/> },
    { id: "ingest", label: "Add Repo", icon: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></> },
    { id: "settings", label: "Settings", icon: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></> },
  ];

  return (
    <div style={{
      width: 220, flexShrink: 0, display: "flex", flexDirection: "column",
      background: t.bgAlt, borderRight: `1px solid ${t.border}`,
    }}>
      {/* logo */}
      <div style={{ padding: "14px 16px 10px", display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 28, height: 28, borderRadius: 8, background: t.accent, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </div>
        <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: "-0.01em", color: t.text }}>reposage</span>
      </div>

      {/* nav */}
      <nav style={{ padding: "8px 8px" }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => setView(item.id)}
            style={{
              width: "100%", display: "flex", alignItems: "center", gap: 9,
              padding: "7px 10px", borderRadius: t.radius, border: "none", cursor: "pointer",
              background: view === item.id ? t.accentSubtle : "transparent",
              color: view === item.id ? (t.accentSubtleFg || t.accent) : t.textSub,
              fontSize: 13.5, fontWeight: view === item.id ? 600 : 400,
              marginBottom: 2, transition: "background 0.12s",
            }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{item.icon}</svg>
            {item.label}
          </button>
        ))}
      </nav>

      <div style={{ height: 1, background: t.border, margin: "4px 12px" }} />

      {/* recent repos */}
      <div style={{ padding: "8px 8px 4px", flex: 1, overflow: "hidden" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "2px 10px 6px" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: t.textMuted, textTransform: "uppercase", letterSpacing: "0.06em" }}>Recent</div>
          <button onClick={onToggleMulti} title="Multi-repo mode"
            style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, border: `1px solid ${multiMode ? t.accent : t.border}`, background: multiMode ? t.accentSubtle : "none", color: multiMode ? t.accent : t.textMuted, cursor: "pointer", fontWeight: 600 }}>
            MULTI
          </button>
        </div>
        {reposLoading && (
          <div style={{ padding: "6px 10px", fontSize: 12.5, color: t.textMuted }}>Loading…</div>
        )}
        {!reposLoading && repos.length === 0 && (
          <div style={{ padding: "6px 10px", fontSize: 12.5, color: t.textMuted }}>No repos indexed yet</div>
        )}
        {repos.map(r => (
          <button key={r.id}
            onClick={() => multiMode ? onToggleRepo(r.id) : onSelectRepo(r)}
            style={{
              width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "6px 10px",
              borderRadius: t.radius, border: "none", cursor: "pointer",
              background: multiMode
                ? (multiSelected.includes(r.id) ? t.accentSubtle : "transparent")
                : (activeRepo?.id === r.id && view === "chat" ? t.accentSubtle : "transparent"),
              color: multiMode
                ? (multiSelected.includes(r.id) ? t.accent : t.text)
                : (activeRepo?.id === r.id && view === "chat" ? t.accent : t.text),
              fontSize: 13, marginBottom: 1, textAlign: "left", transition: "background 0.1s",
            }}>
            {multiMode
              ? <div style={{ width: 13, height: 13, borderRadius: 3, border: `1.5px solid ${multiSelected.includes(r.id) ? t.accent : t.border}`, background: multiSelected.includes(r.id) ? t.accent : "none", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {multiSelected.includes(r.id) && <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                </div>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                </svg>
            }
            <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</span>
          </button>
        ))}
      </div>

      {/* user + logout */}
      <div style={{ padding: "10px 12px", borderTop: `1px solid ${t.border}`, flexShrink: 0 }}>
        {user && (
          <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 6, paddingLeft: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {user.name}
          </div>
        )}
        <button onClick={onLogout}
          style={{
            width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "7px 10px",
            borderRadius: t.radius, border: "none", cursor: "pointer",
            background: "transparent", color: t.textSub, fontSize: 13, transition: "background 0.1s",
          }}
          onMouseEnter={e => e.currentTarget.style.background = t.border}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log out
        </button>
      </div>
    </div>
  );
}

/* ─── RepoCard ────────────────────────────────────────────────────────────── */
function RepoCard({ t, r, onSelect, onDelete, onReingest, onSaveNotes }) {
  const [notes, setNotes] = useState(r.notes || "");
  const [notesOpen, setNotesOpen] = useState(false);
  const [notesSaving, setNotesSaving] = useState(false);

  async function saveNotes() {
    setNotesSaving(true);
    try { await onSaveNotes(r.id, notes); } finally { setNotesSaving(false); }
  }

  return (
    <div style={{
      background: t.bg, border: `1px solid ${t.border}`,
      borderRadius: t.radius + 2, padding: "16px 20px",
      transition: "border-color 0.15s, box-shadow 0.15s", position: "relative",
    }}
    onMouseEnter={e => { e.currentTarget.style.borderColor = t.accent; e.currentTarget.style.boxShadow = `0 0 0 3px ${t.accentSubtle}`; }}
    onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.boxShadow = "none"; }}>
      <div onClick={() => onSelect(r)} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={t.textSub} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          <span style={{ fontWeight: 600, fontSize: 14.5, color: t.text }}>{r.owner ? `${r.owner}/${r.name}` : r.name}</span>
          <span style={{ fontSize: 11.5, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, padding: "2px 7px", borderRadius: 99 }}>{r.lang}</span>
        </div>
        <div style={{ display: "flex", gap: 20, fontSize: 12.5, color: t.textSub }}>
          <span>{r.files} files</span>
          <span>{r.chunks?.toLocaleString()} chunks</span>
          {r.indexed_at && <span>Indexed {timeAgo(r.indexed_at)}</span>}
          {r.questions > 0 && <span style={{ color: t.accent }}>{r.questions} Q&amp;s</span>}
        </div>
      </div>

      {/* Notes toggle */}
      <button onClick={e => { e.stopPropagation(); setNotesOpen(o => !o); }}
        style={{ marginTop: 10, fontSize: 11.5, color: notesOpen ? t.accent : t.textMuted, background: "none", border: `1px solid ${notesOpen ? t.accent : t.border}`, borderRadius: t.radius, padding: "2px 8px", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        </div>
      )}

      {/* Action buttons */}
      <div style={{ position: "absolute", top: 12, right: 12, display: "flex", gap: 4 }}>
        {r.url && (
          <button onClick={e => { e.stopPropagation(); onReingest(r); }}

            onMouseEnter={e => { e.currentTarget.style.color = t.accent; e.currentTarget.style.background = t.accentSubtle; }}
            onMouseLeave={e => { e.currentTarget.style.color = t.textMuted; e.currentTarget.style.background = "none"; }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>

        <button onClick={e => { e.stopPropagation(); onDelete(r); }}
          title="Delete repo"
          style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 4, borderRadius: t.radius, display: "flex", alignItems: "center" }}

/* ─── IngestView ──────────────────────────────────────────────────────────── */

function CopyButton({ text, t }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      onClick={e => { e.stopPropagation(); navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      title="Copy"
      style={{ background: "none", border: "none", cursor: "pointer", color: copied ? "#16a34a" : t.textMuted, padding: "2px 4px", borderRadius: 4, fontSize: 11, display: "flex", alignItems: "center", gap: 3 }}>
      {copied
        ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      }
      {copied ? "Copied" : "Copy"}

function MessageBubble({ msg, t, style, active, onActivate }) {
  const isUser = msg.role === "user";
  const isMinimal = style === "minimal";

  if (isMinimal) {
    return (
      <div onClick={onActivate} style={{ marginBottom: 18, cursor: msg.refs?.length ? "pointer" : "default" }}>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: isUser ? t.accent : t.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {isUser ? "You" : "Reposage"}
        </div>
        <div style={{
          fontSize: 14, lineHeight: 1.7, color: t.text,
          borderLeft: active && !isUser ? `3px solid ${t.accent}` : "3px solid transparent",
          paddingLeft: active && !isUser ? 12 : 0, transition: "border-color 0.15s",
        }}>
          {renderMarkdown(msg.text, t)}
          {msg.refs?.length > 0 && <span style={{ fontSize: 11.5, color: t.accent, marginLeft: 6 }}>· {msg.refs.length} sources</span>}
        </div>
      </div>
    );
  }

  return (
    <div onClick={onActivate}
      style={{
        display: "flex", flexDirection: isUser ? "row-reverse" : "row",
        alignItems: "flex-start", gap: 10, marginBottom: 16,
        cursor: msg.refs?.length ? "pointer" : "default",
      }}>
      <div style={{
        width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
        background: isUser ? t.accent : t.accentSubtle,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 12, fontWeight: 700, color: isUser ? "#fff" : t.accent,
      }}>
        {isUser ? "U" : "R"}
      </div>
      <div style={{ maxWidth: "75%" }}>
        <div style={{
          padding: "10px 14px", borderRadius: t.radius + 2, lineHeight: 1.7, fontSize: 14,
          background: isUser ? t.userBubble : t.aiBubble,
          color: isUser ? t.userBubbleFg : t.aiBubbleFg,
          border: isUser ? "none" : `1px solid ${t.aiBubbleBorder}`,
          boxShadow: active && !isUser ? `0 0 0 2px ${t.accent}` : "none",
          transition: "box-shadow 0.15s",
        }}>
          {renderMarkdown(msg.text, t)}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4, paddingLeft: 2 }}>
          {msg.refs?.length > 0 && (
            <span style={{ fontSize: 11.5, color: t.accent }}>
              {msg.refs.length} source{msg.refs.length > 1 ? "s" : ""} cited ↗
            </span>
          )}
          {!isUser && <CopyButton text={msg.text} t={t} />}
        </div>
      </div>
    </div>
  );
}

/* ─── FileTreePanel ───────────────────────────────────────────────────────── */
function FileTreePanel({ t, files, loading, onClose, onFileClick }) {
  const [expanded, setExpanded] = useState({});

  // Group flat paths into { dirPath: [filename, ...] }
  const tree = {};
  for (const f of files) {
    const parts = f.split("/");
    const dir = parts.length > 1 ? parts.slice(0, -1).join("/") : "(root)";
    const name = parts[parts.length - 1];
    if (!tree[dir]) tree[dir] = [];
    tree[dir].push({ name, full: f });
  }
  const dirs = Object.keys(tree).sort();

  // expand all dirs by default on first load
  useEffect(() => {
    if (dirs.length > 0 && Object.keys(expanded).length === 0) {
      const init = {};
      dirs.forEach(d => { init[d] = true; });
      setExpanded(init);
    }
  }, [files]);

  const toggle = dir => setExpanded(e => ({ ...e, [dir]: !e[dir] }));

  return (
    <div style={{ width: 260, flexShrink: 0, borderLeft: `1px solid ${t.border}`, background: t.bgAlt, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "14px 16px 10px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, textTransform: "uppercase", letterSpacing: "0.07em" }}>
          Files {files.length > 0 && <span style={{ fontWeight: 400, textTransform: "none" }}>({files.length})</span>}
        </div>
        <button onClick={onClose} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 16, lineHeight: 1 }}>✕</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "8px 6px" }}>
        {loading && <div style={{ fontSize: 12.5, color: t.textMuted, padding: "12px 8px" }}>Loading…</div>}
        {!loading && files.length === 0 && (
          <div style={{ fontSize: 12.5, color: t.textMuted, padding: "16px 8px", textAlign: "center", lineHeight: 1.6 }}>
            No files found.<br/>Repo may not be cloned locally.
          </div>
        )}
        {!loading && dirs.map(dir => (
          <div key={dir} style={{ marginBottom: 2 }}>
            <button onClick={() => toggle(dir)} style={{
              width: "100%", display: "flex", alignItems: "center", gap: 5,
              padding: "4px 8px", background: "none", border: "none", cursor: "pointer",
              color: t.textSub, fontSize: 11.5, fontWeight: 600, textAlign: "left",
              borderRadius: t.radius,
            }}
            onMouseEnter={e => e.currentTarget.style.background = t.border}
            onMouseLeave={e => e.currentTarget.style.background = "none"}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                style={{ flexShrink: 0, transform: expanded[dir] ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.12s" }}>
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{dir}</span>
            </button>
            {expanded[dir] && tree[dir].map(({ name, full }) => (
              <button key={full} onClick={() => onFileClick(full)}
                style={{
                  width: "100%", display: "flex", alignItems: "center", gap: 6,
                  padding: "3px 8px 3px 26px", background: "none", border: "none",
                  cursor: "pointer", color: t.text, fontSize: 12, textAlign: "left",
                  borderRadius: t.radius, fontFamily: "'JetBrains Mono','Fira Code',monospace",
                }}
                onMouseEnter={e => { e.currentTarget.style.background = t.accentSubtle; e.currentTarget.style.color = t.accent; }}
                onMouseLeave={e => { e.currentTarget.style.background = "none"; e.currentTarget.style.color = t.text; }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{name}</span>
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── HistoryPanel ────────────────────────────────────────────────────────── */
function HistoryPanel({ t, sessions, loading, onOpen, onClose }) {
  const [query, setQuery] = useState("");

  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
      " " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
  }

  const filtered = query.trim()
    ? sessions.filter(s => s.label.toLowerCase().includes(query.toLowerCase()))
    : sessions;

  return (
    <div style={{ width: 260, flexShrink: 0, borderLeft: `1px solid ${t.border}`, background: t.bgAlt, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "14px 16px 10px", borderBottom: `1px solid ${t.border}`, flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, textTransform: "uppercase", letterSpacing: "0.07em" }}>Saved Conversations</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 16, lineHeight: 1 }}>✕</button>
        </div>
        <input
          value={query} onChange={e => setQuery(e.target.value)}
          placeholder="Search sessions…"
          style={{
            width: "100%", padding: "6px 10px", fontSize: 12.5,
            border: `1px solid ${t.border}`, borderRadius: t.radius,
            background: t.bg, color: t.text, outline: "none", fontFamily: "inherit",
          }}
        />
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "10px 10px" }}>
        {loading && <div style={{ fontSize: 12.5, color: t.textMuted, padding: "12px 4px" }}>Loading…</div>}
        {!loading && sessions.length === 0 && (
          <div style={{ fontSize: 12.5, color: t.textMuted, padding: "16px 4px", textAlign: "center", lineHeight: 1.6 }}>
            No saved conversations yet.<br/>Click "Save conversation" to save one.
          </div>
        )}
        {!loading && sessions.length > 0 && filtered.length === 0 && (
          <div style={{ fontSize: 12.5, color: t.textMuted, padding: "16px 4px", textAlign: "center" }}>No matches</div>
        )}
        {filtered.map(s => (
          <div key={s.id} onClick={() => onOpen(s.id)}
            style={{
              background: t.bg, border: `1px solid ${t.border}`,
              borderRadius: t.radius, padding: "10px 12px", marginBottom: 8,
              cursor: "pointer", transition: "border-color 0.15s",
            }}
            onMouseEnter={e => e.currentTarget.style.borderColor = t.accent}
            onMouseLeave={e => e.currentTarget.style.borderColor = t.border}>
            <div style={{ fontSize: 12.5, color: t.text, fontWeight: 500, marginBottom: 4, lineHeight: 1.4, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
              {s.label || "(no label)"}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: t.textMuted }}>
              <span>{fmtDate(s.saved_at)}</span>
              <span>{Math.floor(s.message_count / 2)} Q&amp;A</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── SessionModal ────────────────────────────────────────────────────────── */
function SessionModal({ t, session, onClose }) {
  const [linkCopied, setLinkCopied] = useState(false);
  function copyShareLink() {
    const url = `${window.location.origin}/#share/${session.id}`;
    navigator.clipboard.writeText(url);
    setLinkCopied(true);
    setTimeout(() => setLinkCopied(false), 2000);
  }

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center",
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: "min(700px, 90vw)", maxHeight: "80vh", display: "flex", flexDirection: "column",
        background: t.bg, borderRadius: t.radius + 4, border: `1px solid ${t.border}`,
        boxShadow: "0 24px 80px rgba(0,0,0,0.25)", overflow: "hidden",
      }}>
        {/* header */}
        <div style={{ padding: "16px 20px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: t.text }}>{session.label || "Saved conversation"}</div>
            <div style={{ fontSize: 11.5, color: t.textMuted, marginTop: 2 }}>
              {new Date(session.saved_at).toLocaleString()} · {Math.floor(session.messages.length / 2)} Q&amp;A pairs
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button onClick={copyShareLink}
              style={{ fontSize: 12, color: linkCopied ? "#16a34a" : t.accent, padding: "4px 10px", border: `1px solid ${linkCopied ? "#bbf7d0" : t.accent}`, borderRadius: t.radius, background: linkCopied ? "#f0fdf4" : "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              {linkCopied ? "Copied!" : "Share link"}
            </button>
            <button onClick={onClose} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 18, lineHeight: 1 }}>✕</button>
          </div>
        </div>
        {/* messages */}
        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
          {session.messages.map((msg, i) => (
            <MessageBubble key={i}
              msg={{ role: msg.role, text: msg.content, refs: msg.refs || [] }}
              t={t} style="sided" active={false} onActivate={() => {}} />
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── SettingsView ────────────────────────────────────────────────────────── */
function SettingsView({ t, user, api, onLogout }) {
  const [name, setName]         = useState(user?.name || "");
  const [currPw, setCurrPw]     = useState("");
  const [newPw, setNewPw]       = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [saving, setSaving]     = useState(false);
  const [toast, setToast]       = useState("");
  const [toastErr, setToastErr] = useState("");

  function showToast(msg, err = false) {
    if (err) { setToastErr(msg); setTimeout(() => setToastErr(""), 3000); }
    else      { setToast(msg);    setTimeout(() => setToast(""),    3000); }
  }

  async function saveName() {
    if (!name.trim()) return;
    setSaving(true);
    try {
      const res = await api("/api/auth/me", { method: "PATCH", body: JSON.stringify({ name: name.trim() }) });
      if (!res.ok) { const d = await res.json(); showToast(d.detail || "Failed to update name", true); return; }
      showToast("Name updated");
    } finally { setSaving(false); }
  }

  async function savePassword() {
    if (newPw !== confirmPw) { showToast("Passwords don't match", true); return; }
    if (!newPw) return;
    setSaving(true);
    try {
      const res = await api("/api/auth/me", { method: "PATCH", body: JSON.stringify({ current_password: currPw, new_password: newPw }) });
      if (!res.ok) { const d = await res.json(); showToast(d.detail || "Failed to update password", true); return; }
      showToast("Password updated");
      setCurrPw(""); setNewPw(""); setConfirmPw("");
    } finally { setSaving(false); }
  }

  async function deleteAccount() {
    if (!confirm("Delete your account? This cannot be undone.")) return;
    await api("/api/auth/me", { method: "DELETE" });
    onLogout();
  }

  const fieldStyle = { width: "100%", padding: "9px 12px", fontSize: 14, border: `1.5px solid ${t.border}`, borderRadius: t.radius, outline: "none", background: t.bg, color: t.text, fontFamily: "inherit" };
  const labelStyle = { display: "block", fontSize: 12.5, fontWeight: 600, color: t.textSub, marginBottom: 6 };
  const sectionStyle = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: t.radius + 2, padding: "20px 24px", marginBottom: 16 };

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>
      <div style={{ maxWidth: 520 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: t.text, marginBottom: 4 }}>Settings</h1>
        <p style={{ fontSize: 13.5, color: t.textSub, marginBottom: 24 }}>Manage your account</p>

        {toast    && <div style={{ padding: "10px 14px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: t.radius, color: "#15803d", fontSize: 13, marginBottom: 12 }}>{toast}</div>}
        {toastErr && <div style={{ padding: "10px 14px", background: "#fff1f2", border: "1px solid #fecdd3", borderRadius: t.radius, color: "#be123c", fontSize: 13, marginBottom: 12 }}>{toastErr}</div>}

        {/* Profile */}
        <div style={sectionStyle}>
          <div style={{ fontSize: 13, fontWeight: 700, color: t.text, marginBottom: 16 }}>Profile</div>
          <div style={{ marginBottom: 12 }}>
            <label style={labelStyle}>Email</label>
            <div style={{ ...fieldStyle, color: t.textMuted, background: t.bgAlt }}>{user?.email}</div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={labelStyle}>Display name</label>
            <input value={name} onChange={e => setName(e.target.value)} style={fieldStyle}
              onFocus={e => e.target.style.borderColor = t.accent}
              onBlur={e => e.target.style.borderColor = t.border} />
          </div>
          <button onClick={saveName} disabled={saving || !name.trim()}
            style={{ padding: "8px 20px", background: t.accent, color: "#fff", border: "none", borderRadius: t.radius, fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>
            {saving ? "Saving…" : "Save name"}
          </button>
        </div>

        {/* Password */}
        <div style={sectionStyle}>
          <div style={{ fontSize: 13, fontWeight: 700, color: t.text, marginBottom: 16 }}>Change password</div>
          {[["Current password", currPw, setCurrPw], ["New password", newPw, setNewPw], ["Confirm new password", confirmPw, setConfirmPw]].map(([lbl, val, set]) => (
            <div key={lbl} style={{ marginBottom: 12 }}>
              <label style={labelStyle}>{lbl}</label>
              <input type="password" value={val} onChange={e => set(e.target.value)} style={fieldStyle}
                onFocus={e => e.target.style.borderColor = t.accent}
                onBlur={e => e.target.style.borderColor = t.border} />
            </div>
          ))}
          <button onClick={savePassword} disabled={saving || !currPw || !newPw || !confirmPw}
            style={{ padding: "8px 20px", background: t.accent, color: "#fff", border: "none", borderRadius: t.radius, fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>
            {saving ? "Saving…" : "Update password"}
          </button>
        </div>

        {/* Danger */}
        <div style={{ ...sectionStyle, borderColor: "#fecdd3" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#be123c", marginBottom: 8 }}>Danger zone</div>
          <p style={{ fontSize: 13, color: t.textSub, marginBottom: 14 }}>Permanently delete your account and all saved data.</p>
          <button onClick={deleteAccount}
            style={{ padding: "8px 20px", background: "#e11d48", color: "#fff", border: "none", borderRadius: t.radius, fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>
            Delete account
          </button>
        </div>
      </div>
    </div>
  );
}

const ta = T.notion; // auth pages always use Notion palette

function AuthInput({ label, type = "text", value, onChange, placeholder }) {

function AuthError({ msg }) {
  if (!msg) return null;
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "10px 14px", background: "#fff1f2", border: "1px solid #fecdd3", borderRadius: ta.radius, marginBottom: 16, fontSize: 13, color: "#be123c" }}>

      {msg}

}

function LoginPage({ onSwitch, onLogin }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);

  async function submit() {
    setError(""); setLoading(true);
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.detail || "Login failed"); return; }
      // fetch user info
      const me = await fetch("/api/auth/me", {
        headers: { "Authorization": `Bearer ${data.access_token}` },
      }).then(r => r.json());
      onLogin(data.access_token, me);
    } catch (e) {
      setError("Network error — is the server running?");
    } finally { setLoading(false); }
  }

  return (
    <>
      <div style={{ width: 40, height: 40, borderRadius: 10, background: ta.accentSubtle, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={ta.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: ta.text, marginBottom: 4 }}>Welcome back</h2>
      <p style={{ fontSize: 13.5, color: ta.textSub, marginBottom: 28, lineHeight: 1.6 }}>Sign in to your Reposage account</p>
      <AuthError msg={error} />
      <AuthInput label="Email" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
      <AuthInput label="Password" type="password" value={password} onChange={setPassword} placeholder="••••••••" />
      <button onClick={submit} disabled={loading || !email || !password}
        style={{
          width: "100%", padding: "10px 0", marginTop: 4,
          background: email && password && !loading ? ta.accent : ta.border,
          color: "#fff", border: "none", borderRadius: ta.radius,
          fontSize: 14, fontWeight: 600, cursor: email && password && !loading ? "pointer" : "default",
          marginBottom: 20,
        }}>
        {loading ? "Signing in…" : "Sign in"}
      </button>
      <p style={{ textAlign: "center", fontSize: 13.5, color: ta.textSub }}>
        Don't have an account?{" "}
        <span onClick={onSwitch} style={{ color: ta.accent, cursor: "pointer", fontWeight: 500 }}>Sign up</span>
      </p>
    </>
  );
}

function SignupPage({ onSwitch, onLogin }) {
  const [name, setName]           = useState("");
  const [email, setEmail]         = useState("");
  const [password, setPassword]   = useState("");
  const [confirm, setConfirm]     = useState("");
  const [error, setError]         = useState("");
  const [loading, setLoading]     = useState(false);

  async function submit() {
    if (password !== confirm) { setError("Passwords don't match"); return; }
    setError(""); setLoading(true);
    try {
      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.detail || "Registration failed"); return; }
      // auto-login
      const login = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      }).then(r => r.json());
      const me = await fetch("/api/auth/me", {
        headers: { "Authorization": `Bearer ${login.access_token}` },
      }).then(r => r.json());
      onLogin(login.access_token, me);
    } catch (e) {
      setError("Network error — is the server running?");
    } finally { setLoading(false); }
  }

  const ready = name && email && password && confirm && !loading;
  return (
    <>
      <div style={{ width: 40, height: 40, borderRadius: 10, background: ta.accentSubtle, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={ta.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: ta.text, marginBottom: 4 }}>Create an account</h2>
      <p style={{ fontSize: 13.5, color: ta.textSub, marginBottom: 28, lineHeight: 1.6 }}>Start exploring your codebases with Reposage</p>
      <AuthError msg={error} />
      <AuthInput label="Name" value={name} onChange={setName} placeholder="Ada Lovelace" />
      <AuthInput label="Email" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
      <AuthInput label="Password" type="password" value={password} onChange={setPassword} placeholder="••••••••" />
      <AuthInput label="Confirm password" type="password" value={confirm} onChange={setConfirm} placeholder="••••••••" />
      <button onClick={submit} disabled={!ready}
        style={{
          width: "100%", padding: "10px 0", marginTop: 4,
          background: ready ? ta.accent : ta.border,
          color: "#fff", border: "none", borderRadius: ta.radius,
          fontSize: 14, fontWeight: 600, cursor: ready ? "pointer" : "default",
          marginBottom: 20,
        }}>
        {loading ? "Creating account…" : "Create account"}
      </button>
      <p style={{ textAlign: "center", fontSize: 13.5, color: ta.textSub }}>
        Already have an account?{" "}
        <span onClick={onSwitch} style={{ color: ta.accent, cursor: "pointer", fontWeight: 500 }}>Sign in</span>
      </p>
    </>
  );
}

function AuthApp({ onLogin }) {
  const [page, setPage] = useState("login");
  return (
    <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: ta.bgAlt }}>
      <div style={{ width: 420, background: ta.bg, border: `1px solid ${ta.border}`, borderRadius: ta.radius + 6, padding: "36px 40px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
        {page === "login"

}

            t={t} style="sided" active={false} onActivate={() => {}} />
        ))}
      </div>
    </div>
  );
}

/* ─── Root ────────────────────────────────────────────────────────────────── */
function Root() {
  const [token, setToken] = useState(() => localStorage.getItem("rs_token"));
  const [user,  setUser]  = useState(null);

  // Check for shared session link: /#share/<id>
  const hash = window.location.hash;
  const shareMatch = hash.match(/^#share\/([a-f0-9]+)$/);
  if (shareMatch) return <ShareView sessionId={shareMatch[1]} />;

  const handleLogin = (tok, usr) => {
    localStorage.setItem("rs_token", tok);
    setToken(tok);
    setUser(usr);
  };
  const handleLogout = () => {
    localStorage.removeItem("rs_token");
    setToken(null);
    setUser(null);
  };

  if (!token) return <AuthApp onLogin={handleLogin} />;
  return <App token={token} user={user} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
